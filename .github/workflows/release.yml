name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-beta*"   # v1.2.3-beta, v1.2.3-beta.1

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GONOSUMDB: "github.com/TacBuild/*"
          GOPROXY: "https://proxy.golang.org,direct"
        run: |
          mkdir -p dist
          make build-${{ matrix.goos }}-${{ matrix.goarch }}
          cp build/tacchaind-${{ matrix.goos }}-${{ matrix.goarch }} dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tacchaind-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/tacchaind-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist
          sha256sum tacchaind-linux-amd64 tacchaind-linux-arm64 > checksums.txt
          cat checksums.txt

      - name: Determine pre-release
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *"-beta"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/tacchaind-linux-amd64
            dist/tacchaind-linux-arm64
            dist/checksums.txt
